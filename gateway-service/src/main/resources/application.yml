server:
  port: 8000
spring:
  profiles:
    active: dev # 현재 활성화할 프로파일
  application:
    name: gateway-server
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/v1/user-service/**
          filters:
            - RewritePath=/api/v1/user-service/(?<segment>.*), /${segment}
        - id: room-service
          uri: lb://ROOM-SERVICE
          predicates:
            - Path=/api/v1/room-service/**
          filters:
            - RewritePath=/api/v1/room-service/(?<segment>.*), /${segment}
        - id: review-service
          uri: lb://REVIEW-SERVICE
          predicates:
            - Path=/api/v1/review-service/**
          filters:
            - RewritePath=/api/v1/review-service/(?<segment>.*), /${segment}
        - id: reservation-service
          uri: lb://RESERVATION-SERVICE
          predicates:
            - Path=/api/v1/reservation-service/**
          filters:
            - RewritePath=/api/v1/reservation-service/(?<segment>.*), /${segment}
        - id: payment-service
          uri: lb://PAYMENT-SERVICE
          predicates:
            - Path=/api/v1/payment-service/**
          filters:
            - RewritePath=/api/v1/payment-service/(?<segment>.*), /${segment}

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka

